<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Acceso</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Vinculación del CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Botón para alternar Tema -->
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
        <span class="icon-sun">☀️ Mode</span>
    </button>

    <div class="container">
        <h1>Selecciona un Panel</h1>
        <p class="subtitle">Introduce la contraseña correcta para acceder a cada subpágina.</p>

        <!-- Contenedor de la cuadrícula de botones -->
        <div class="button-grid">
            <button class="btn btn-main" onclick="accessPanel(1, 'miure', 'myureng.html')">
                <span class="btn-title">Panel Principal 1</span>
                <span class="btn-desc">Acceso Estándar</span>
            </button>
            
            <button class="btn btn-main" onclick="accessPanel(2, 'yujin', 'hanmi.html')">
                <span class="btn-title">메인 패널 2</span>
                <span class="btn-desc">TBD</span>
            </button>
            
            <button class="btn btn-short" onclick="accessPanel(3, '102318', 'admin.html')">
                <span class="btn-title">Admin Documentation</span>
            </button>
        </div>
    </div>

    <!-- Lógica básica para contraseñas y tema -->
    <script>
        // Cambiar entre tema claro y oscuro
        const html = document.documentElement;
        const toggleBtn = document.getElementById('themeToggle');

        toggleBtn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            toggleBtn.querySelector('span').textContent = newTheme === 'light' ? '☀️ Claro' : '🌙 Oscuro';
        });

        // Simulación de validación de contraseña para redirección
        function accessPanel(panelId, correctPassword, targetUrl) {
            const password = prompt(`Introduce la contraseña para el Botón ${panelId}:`);
            
            if (password === null) return; // Si el usuario cancela

            if (password === correctPassword) {
                alert('¡Contraseña correcta! Redirigiendo...');
                window.location.href = targetUrl; // Cambia esto por tus subpáginas reales
            } else {
                alert('Contraseña incorrecta. Acceso denegado.');
            }
        }
    </script>
</body>
</html>
